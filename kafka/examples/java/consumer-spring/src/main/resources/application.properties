# Spring Kafka application name
spring.application.name=spring-kafka-consumer

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:19092

# Consumer Configuration
spring.kafka.consumer.group-id=spring-concurrent-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Performance Tuning
spring.kafka.consumer.fetch-min-size=1048576
spring.kafka.consumer.fetch-max-wait=500ms
spring.kafka.consumer.max-poll-records=500

# Concurrency Settings
spring.kafka.listener.concurrency=3

# Manual commit settings (optional)
spring.kafka.consumer.enable-auto-commit=false

# Logging
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.com.kafka=DEBUG

